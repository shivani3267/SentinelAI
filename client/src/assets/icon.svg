<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f" />
      <stop offset="50%" stop-color="#0f2b48" />
      <stop offset="100%" stop-color="#173d63" />
    </linearGradient>

    <linearGradient id="primaryBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.2"/>
    </linearGradient>

    <pattern id="cyberGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1e40af" stroke-width="0.5" stroke-opacity="0.3" />
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComponentTransfer in="blur" result="boost">
        <feFuncA type="linear" slope="1.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="boost" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect width="800" height="600" fill="url(#cyberGrid)" />

  <circle cx="400" cy="300" r="220" fill="none" stroke="#1d4ed8" stroke-width="1" stroke-opacity="0.4" />
  <circle cx="400" cy="300" r="160" fill="none" stroke="#0284c7" stroke-width="1" stroke-dasharray="8 4" stroke-opacity="0.6" />
  <circle cx="400" cy="300" r="280" fill="none" stroke="#1e3a8a" stroke-width="1.5" stroke-opacity="0.2" />

  <g opacity="0.6">
    <path d="M 150 150 L 250 220 L 220 380 L 120 420" fill="none" stroke="#0077b6" stroke-width="1.5" stroke-dasharray="5 5" />
    <path d="M 650 150 L 550 220 L 580 380 L 680 420" fill="none" stroke="#0077b6" stroke-width="1.5" stroke-dasharray="5 5" />
    <circle cx="150" cy="150" r="4" fill="#38bdf8" />
    <circle cx="250" cy="220" r="3" fill="#ffffff" />
    <circle cx="220" cy="380" r="5" fill="#0077b6" />
    <circle cx="650" cy="150" r="4" fill="#38bdf8" />
    <circle cx="550" cy="220" r="5" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="580" cy="380" r="3" fill="#0077b6" />
  </g>

  <g transform="translate(0, 0)">
    <path d="M 400 120 C 480 120, 540 140, 560 170 C 560 280, 500 390, 400 460 C 300 390, 240 280, 240 170 C 260 140, 320 120, 400 120 Z" 
          fill="none" stroke="#38bdf8" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
    
    <path d="M 400 120 C 480 120, 540 140, 560 170 C 560 280, 500 390, 400 460 C 300 390, 240 280, 240 170 C 260 140, 320 120, 400 120 Z" 
          fill="#0c2340" fill-opacity="0.75" stroke="url(#primaryBlue)" stroke-width="6" />

    <path d="M 270 190 L 370 190 L 390 220" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.5" />
    <path d="M 530 190 L 430 190 L 410 220" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.5" />
  </g>

  <g transform="translate(0, -10)">
    <path d="M 350 270 V 230 C 350 200, 370 180, 400 180 C 430 180, 450 200, 450 230 V 270" 
          fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
    
    <line x1="200" y1="280" x2="600" y2="280" stroke="#38bdf8" stroke-width="4" filter="url(#intenseGlow)" />
    <line x1="250" y1="280" x2="550" y2="280" stroke="#ffffff" stroke-width="1.5" />

    <polygon points="330,270 470,270 490,360 400,410 310,360" fill="#0f172a" stroke="url(#accentGlow)" stroke-width="3" />

    <path d="M 365 335 L 392 362 L 440 305" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M 365 335 L 392 362 L 440 305" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M 280 200 L 260 200 L 260 220" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.7"/>
  <path d="M 520 200 L 540 200 L 540 220" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.7"/>
  <path d="M 260 380 L 260 400 L 280 400" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.7"/>
  <path d="M 540 380 L 540 400 L 520 400" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.7"/>

  <g fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold" opacity="0.35">
    <text x="280" y="160">01101</text>
    <text x="480" y="160">10010</text>
    <text x="210" y="300">SECURE</text>
    <text x="535" y="300">PASSED</text>
    <text x="280" y="450">001</text>
    <text x="500" y="450">110</text>
  </g>

  <g filter="url(#glow)">
    <circle cx="310" cy="210" r="3" fill="#ffffff" />
    <circle cx="500" cy="240" r="4" fill="#38bdf8" />
    <circle cx="480" cy="390" r="3" fill="#ffffff" />
    <circle cx="320" cy="350" r="4" fill="#38bdf8" />
  </g>
</svg>
